<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Uptown Dashboard</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
</head>
<body>
  <script src="/config.js"></script>
  <script src="/supabase-client.js"></script>
  <script>
    // Belt-and-suspenders for password recovery: if Supabase falls back
    // to the Site URL (= root) because the redirect_to in the recovery
    // email didn't match the auth.redirect_urls allowlist exactly,
    // the recovery hash still lands here — forward it to /reset/ with
    // the hash preserved so the user can finish setting their password.
    if (location.hash && location.hash.includes("type=recovery")) {
      window.location.replace("/reset/" + location.hash);
    } else {
      // Standard root-routing: signed-in users go to the dashboard,
      // everyone else to login. Avoids a flash of the login page for
      // signed-in users hitting the root URL.
      sb.ensureFreshSession()
        .then(s => window.location.replace(s ? "/dashboard/" : "/login/"))
        .catch(() => window.location.replace("/login/"));
    }
  </script>
</body>
</html>
