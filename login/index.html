<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Uptown Dashboard</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body class="login-body">

  <!--
    One form, two modes. `?signup=1` or `?email=…` flips into sign-up
    mode; otherwise the card renders as sign-in. The toggle at the
    bottom swaps modes in-place without a page reload so the URL
    params (email pre-fill, in particular) don't get stripped.
  -->
  <form id="login-form" class="login-card" autocomplete="on">
    <div class="login-brand">
      <img src="/assets/logo-white.png" alt="Uptown" />
      <div>
        <div class="login-brand-name">Uptown Dashboard</div>
        <div class="login-brand-sub">Operator Console</div>
      </div>
    </div>

    <div id="login-title" class="login-title">Sign in to continue</div>

    <!-- Hidden in sign-in mode. Name ends up on auth.users.raw_user_meta_data
         where the handle_new_auth_user trigger reads it into operators.name. -->
    <div id="name-field" class="login-field" hidden>
      <label class="login-label" for="name">Full name</label>
      <input id="name" class="login-input" type="text"
             autocomplete="name" placeholder="Alex Rivera" />
    </div>

    <div class="login-field">
      <label class="login-label" for="email">Email</label>
      <input id="email" class="login-input" type="email" required
             autocomplete="email" placeholder="you@uptown.com" />
    </div>

    <div id="password-field" class="login-field">
      <label class="login-label" for="password">Password</label>
      <input id="password" class="login-input" type="password" required
             autocomplete="current-password" placeholder="••••••••" />
      <!-- Forgot-password link: visible only in sign-in mode. Click
           swaps the form into "reset" mode (just email + send reset
           button); the password field hides. -->
      <a id="forgot-link" class="login-forgot" href="#" role="button">Forgot password?</a>
    </div>

    <button id="submit-btn" class="login-submit" type="submit">Sign in</button>
    <div id="error-msg" class="login-error"></div>
    <div id="info-msg" class="login-info"></div>

    <div class="login-switch">
      <span id="switch-prompt">New to Uptown?</span>
      <a id="switch-link" href="#" role="button">Create an account</a>
    </div>

    <!-- Click-wrap consent. Lives inside the card so it's visually
         tied to the submit button and unmissable. /terms/ /
         /privacy/ open in the same window — they're plain pages,
         no auth context to preserve. -->
    <div class="login-legal">
      By signing in, you agree to our <a href="/terms/">Terms</a> and <a href="/privacy/">Privacy Policy</a>.
    </div>
  </form>

  <script src="/config.js"></script>
  <script src="/supabase-client.js"></script>
  <script>
    // If the operator is already signed in, skip the form entirely.
    // Exception: if they arrived via a signup link (?signup=1 or ?email=),
    // staying here would be confusing — so we honor signup mode even for
    // signed-in users and let them re-auth.
    const initialParams = new URLSearchParams(location.search);
    const wantsSignup   = initialParams.has("signup")
                       || initialParams.has("email");

    if (!wantsSignup) {
      sb.ensureFreshSession().then(session => {
        if (session) window.location.replace("/dashboard/");
      });
    }

    const form         = document.getElementById("login-form");
    const titleEl      = document.getElementById("login-title");
    const nameFieldEl  = document.getElementById("name-field");
    const nameEl       = document.getElementById("name");
    const emailEl      = document.getElementById("email");
    const pwFieldEl    = document.getElementById("password-field");
    const pwEl         = document.getElementById("password");
    const submitBtn    = document.getElementById("submit-btn");
    const errorEl      = document.getElementById("error-msg");
    const infoEl       = document.getElementById("info-msg");
    const switchPromptEl = document.getElementById("switch-prompt");
    const switchLinkEl   = document.getElementById("switch-link");
    const forgotLinkEl   = document.getElementById("forgot-link");

    let mode = wantsSignup ? "signup" : "signin";

    // Pre-fill from ?email= (used when an org admin copies a signup
    // link and hands it to an invitee).
    const emailFromUrl = initialParams.get("email");
    if (emailFromUrl) emailEl.value = emailFromUrl;

    applyMode();

    function applyMode() {
      errorEl.textContent = "";
      infoEl.textContent  = "";
      if (mode === "signup") {
        titleEl.textContent      = "Create your account";
        nameFieldEl.hidden       = false;
        nameEl.required          = true;
        pwFieldEl.hidden         = false;
        pwEl.required            = true;
        pwEl.setAttribute("autocomplete", "new-password");
        submitBtn.textContent    = "Create account";
        switchPromptEl.textContent = "Already have an account?";
        switchLinkEl.textContent   = "Sign in";
        document.title           = "Create account — Uptown Dashboard";
      } else if (mode === "reset") {
        titleEl.textContent      = "Reset your password";
        nameFieldEl.hidden       = true;
        nameEl.required          = false;
        pwFieldEl.hidden         = true;
        pwEl.required            = false;
        submitBtn.textContent    = "Send reset link";
        switchPromptEl.textContent = "Remembered it?";
        switchLinkEl.textContent   = "Back to sign in";
        document.title           = "Reset password — Uptown Dashboard";
      } else {
        titleEl.textContent      = "Sign in to continue";
        nameFieldEl.hidden       = true;
        nameEl.required          = false;
        pwFieldEl.hidden         = false;
        pwEl.required            = true;
        pwEl.setAttribute("autocomplete", "current-password");
        submitBtn.textContent    = "Sign in";
        switchPromptEl.textContent = "New to Uptown?";
        switchLinkEl.textContent   = "Create an account";
        document.title           = "Sign in — Uptown Dashboard";
      }
    }

    switchLinkEl.addEventListener("click", (e) => {
      e.preventDefault();
      // From reset mode, "Back to sign in" is the only switch.
      // Otherwise toggle between signin and signup.
      if (mode === "reset")        mode = "signin";
      else if (mode === "signup")  mode = "signin";
      else                          mode = "signup";
      applyMode();
    });

    forgotLinkEl.addEventListener("click", (e) => {
      e.preventDefault();
      mode = "reset";
      applyMode();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      infoEl.textContent  = "";
      submitBtn.disabled  = true;
      const prevLabel     = submitBtn.textContent;
      submitBtn.textContent =
        mode === "signup" ? "Creating account…" :
        mode === "reset"  ? "Sending…" :
                            "Signing in…";

      try {
        if (mode === "reset") {
          await sb.resetPasswordForEmail(
            emailEl.value.trim(),
            `${location.origin}/reset/`
          );
          // Don't reveal whether the email matched a real user — Supabase
          // silently no-ops for unknown emails to prevent enumeration.
          // Show the same "if it's on file, check your inbox" either way.
          infoEl.textContent =
            "If that email is on file, a reset link is on its way. Check your inbox.";
          submitBtn.disabled    = false;
          submitBtn.textContent = prevLabel;
          return;
        }

        if (mode === "signup") {
          const result = await sb.signUp(
            emailEl.value.trim(),
            pwEl.value,
            { name: nameEl.value.trim() }
          );
          if (result.needsConfirmation) {
            // Confirm-email mode (Supabase project setting). The trigger
            // chain only fires once the user clicks the confirmation
            // email, so we can't drop them on the dashboard yet.
            infoEl.textContent =
              "Check your inbox to confirm your email, then sign in.";
            submitBtn.disabled    = false;
            submitBtn.textContent = prevLabel;
            return;
          }
          // Auto-confirm mode: trigger chain has already created the
          // operators row and claimed any pending invites. Dashboard is
          // ready.
          window.location.replace("/dashboard/");
          return;
        }

        await sb.signIn(emailEl.value.trim(), pwEl.value);
        window.location.replace("/dashboard/");
      } catch (err) {
        errorEl.textContent   = err.message
          || ((mode === "signup") ? "Sign-up failed" : "Sign-in failed");
        submitBtn.disabled    = false;
        submitBtn.textContent = prevLabel;
      }
    });
  </script>
</body>
</html>
