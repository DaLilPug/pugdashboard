<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform admin — Uptown</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="header-logo">
        <img src="/assets/logo-white.png" alt="Uptown" />
        <div class="header-wordmark">
          <div class="header-wordmark-top">UPTOWN</div>
          <div class="header-wordmark-bot">Operator Console</div>
        </div>
      </div>
      <div class="header-pipe"></div>
      <a href="/dashboard/" class="header-breadcrumb">← Dashboard</a>
    </div>
    <div class="header-right">
      <div id="user-email" class="header-user"></div>
      <!-- Guides link: always visible. Leftmost utility-nav button. -->
      <a href="/guides/" class="btn-guides-link">Guides</a>
      <button id="signout-btn" class="btn-signout" type="button">Sign out</button>
    </div>
  </header>

  <!--
    Re-uses the account-titlebar style from /account/ for the page
    heading + subtitle, so /platform-admin/ reads as a sibling page
    rather than a bolt-on. The subtitle copy reminds Austin (and future
    platform admins) what this view is actually showing.
  -->
  <div class="account-titlebar">
    <h1>Platform admin</h1>
    <div class="account-meta">Every organization, every seat. Edit seat caps and drill into any tenant.</div>
  </div>

  <main class="main main-wide">
    <section class="table-section">
      <div class="section-head">
        <h2>Organizations</h2>
        <span id="org-count" class="section-meta"></span>
      </div>
      <div class="table-wrap">
        <table class="client-table" id="org-table">
          <thead>
            <tr>
              <th>Organization</th>
              <th>Admin contact</th>
              <th class="num" title="Active accounts / Stripe-paid seats / Platform-admin-gifted seats. Click the gifted number to edit.">Used / Paid / Gifted</th>
              <th class="num">Total clients</th>
              <th class="num">Outreach</th>
              <th>Created</th>
              <th class="col-actions" aria-label="Row actions"></th>
            </tr>
          </thead>
          <tbody id="org-tbody">
            <tr><td colspan="7" class="loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/config.js"></script>
  <script src="/supabase-client.js"></script>
  <script src="/auth.js"></script>
  <script src="/mobile-nav.js" defer></script>
  <script>
    (async function main() {
      const session = await Auth.requireAuth();
      Auth.wireSignOut();
      Auth.wireUserEmail(session);

      const tbodyEl = document.getElementById("org-tbody");
      const countEl = document.getElementById("org-count");
      const colspan = 7;

      // Gate the whole page on platform-admin status. Non-admins shouldn't
      // be on this URL at all, but the RPC still returns zero rows for
      // them — so without this check they'd see an empty table with no
      // explanation. Redirect them back to the main dashboard, which is
      // the view they actually have access to.
      const isPA = await Auth.isPlatformAdmin();
      if (!isPA) {
        // Use replace() so the back button doesn't trap them here.
        window.location.replace("/dashboard/");
        return;
      }

      await load();

      async function load() {
        tbodyEl.innerHTML = `<tr><td colspan="${colspan}" class="loading">Loading…</td></tr>`;

        let orgs = [];
        try {
          // POST-only RPC — calling it as GET would need the function
          // annotated IMMUTABLE/STABLE with volatile=stable, which it is
          // (language sql / stable), but PostgREST still defaults to POST
          // for function calls that don't have read-only URL semantics
          // set up, so we stick with POST for predictability.
          orgs = await sb.sbFetch("/rest/v1/rpc/platform_admin_org_summary", {
            method: "POST",
            body:   JSON.stringify({}),
          });
        } catch (err) {
          tbodyEl.innerHTML =
            `<tr><td colspan="${colspan}" class="loading">Couldn't load organizations: ${esc(err.message)}</td></tr>`;
          return;
        }

        if (!Array.isArray(orgs) || orgs.length === 0) {
          tbodyEl.innerHTML =
            `<tr><td colspan="${colspan}" class="loading">No organizations yet.</td></tr>`;
          countEl.textContent = "";
          return;
        }

        countEl.textContent = `— ${orgs.length} org${orgs.length === 1 ? '' : 's'}`;
        tbodyEl.innerHTML = orgs.map(renderRow).join("");
        wireRowHandlers(orgs);
      }

      function renderRow(org) {
        const seatsUsed      = Number(org.seats_used)      || 0;
        const seatsPaid      = Number(org.seats_paid)      || 0;
        const seatsPurchased = Number(org.seats_purchased) || 0;
        const seatsGifted    = Number(org.seats_gifted)    || 0;
        const clientCnt      = Number(org.client_count)    || 0;
        const outreachCt     = Number(org.outreach_count)  || 0;
        const atCap          = seatsUsed >= seatsPaid;
        const nearCap        = !atCap && seatsUsed >= seatsPaid * 0.9 && seatsPaid > 0;
        const seatClass      = atCap ? "seats-at-cap" : nearCap ? "seats-near-cap" : "";

        // Three-value display: Used / Paid / Gifted. Used and Paid
        // are read-only (paid is Stripe-managed); only Gifted is
        // inline-editable. The td.editable-seats class still wires
        // the click handler — but it now targets the gifted number
        // specifically.
        return `
          <tr data-org-id="${esc(org.id)}">
            <td class="client-cell">
              <span class="client-name">${esc(org.name)}</span>
            </td>
            <td>${org.admin_email ? esc(org.admin_email) : `<span class="editable-empty">— none —</span>`}</td>
            <td class="num editable-seats ${seatClass}" data-field="seats_gifted" title="Click the gifted number to edit">
              <span class="seats-used">${fmtInt(seatsUsed)}</span>
              <span class="seats-sep">/</span>
              <span class="seats-paid">${fmtInt(seatsPurchased)}</span>
              <span class="seats-sep">/</span>
              <span class="editable-value seats-gifted">${fmtInt(seatsGifted)}</span>
            </td>
            <td class="num">${fmtInt(clientCnt)}</td>
            <td class="num">${fmtInt(outreachCt)}</td>
            <td>${fmtDateTime(org.created_at)}</td>
            <td class="col-actions">
              <a class="btn-row-action btn-drill-in" href="/dashboard/?as_org=${encodeURIComponent(org.id)}" title="Open the dashboard scoped to this organization">View as org</a>
            </td>
          </tr>
        `;
      }

      function wireRowHandlers(orgs) {
        // Map of id → the live row object so the inline edit handler
        // can mutate it in place after saving without re-running load().
        // (The "Manage seats" prompt-based flow was removed once the
        //  inline-edit on the Gifted column covered the same surface
        //  cleanly via grant_gifted_seats / revoke_gifted_seats.)
        const byId = new Map(orgs.map(o => [o.id, o]));

        tbodyEl.querySelectorAll("td.editable-seats").forEach(td => {
          td.addEventListener("click", (e) => {
            // Only the gifted span is meant to be the click target;
            // ignore clicks on the used/paid spans or separators.
            if (!e.target.closest(".seats-gifted, .editable-value")) return;
            e.stopPropagation();
            if (td.classList.contains("editing")) return;
            const tr    = td.closest("tr");
            const orgId = tr.dataset.orgId;
            const org   = byId.get(orgId);
            if (!org) return;

            const currentGifted    = Number(org.seats_gifted)    || 0;
            const currentPurchased = Number(org.seats_purchased) || 0;
            const seatsUsed        = Number(org.seats_used)      || 0;

            td.classList.add("editing");

            // Inline editor on just the gifted number. Used + Paid
            // stay rendered as read-only prefix so the admin sees
            // the full math while typing.
            const input = document.createElement("input");
            input.type  = "number";
            input.min   = "0";
            input.step  = "1";
            input.value = String(currentGifted);
            input.className = "editable-input editable-input-seats";

            td.innerHTML = "";
            const prefix = document.createElement("span");
            prefix.className = "seats-used-prefix";
            prefix.textContent = `${fmtInt(seatsUsed)} / ${fmtInt(currentPurchased)} / `;
            td.appendChild(prefix);
            td.appendChild(input);
            input.focus();
            input.select();

            let done = false;
            const restore = () => {
              td.classList.remove("editing");
              const newPaid     = Number(org.seats_paid)      || 0;
              const newUsed     = Number(org.seats_used)      || 0;
              const newPurchased= Number(org.seats_purchased) || 0;
              const newGifted   = Number(org.seats_gifted)    || 0;
              const atCap       = newUsed >= newPaid;
              const nearCap     = !atCap && newUsed >= newPaid * 0.9 && newPaid > 0;
              td.classList.toggle("seats-at-cap",   atCap);
              td.classList.toggle("seats-near-cap", nearCap);
              td.innerHTML =
                `<span class="seats-used">${fmtInt(newUsed)}</span>` +
                `<span class="seats-sep">/</span>` +
                `<span class="seats-paid">${fmtInt(newPurchased)}</span>` +
                `<span class="seats-sep">/</span>` +
                `<span class="editable-value seats-gifted">${fmtInt(newGifted)}</span>`;
            };

            const commit = async () => {
              if (done) return;
              done = true;
              const raw = input.value.trim();
              if (raw === "" || !Number.isFinite(Number(raw))) {
                restore();
                return;
              }
              const nextGifted = Math.floor(Number(raw));
              if (nextGifted < 0)              { alert("Gifted seats can't be negative."); restore(); return; }
              if (nextGifted === currentGifted) { restore(); return; }

              const delta = nextGifted - currentGifted;
              const rpc   = delta > 0 ? "grant_gifted_seats" : "revoke_gifted_seats";
              const qty   = Math.abs(delta);

              try {
                await sb.sbFetch(`/rest/v1/rpc/${rpc}`, {
                  method: "POST",
                  body:   JSON.stringify({ p_org_id: orgId, p_qty: qty }),
                });
                // Cache update — the trigger may have auto-archived
                // some clients (if revoke pushed below active count),
                // so refresh seats_used too. Cheapest path is to
                // re-fetch this org's row from the summary RPC.
                org.seats_gifted    = nextGifted;
                org.seats_paid      = currentPurchased + nextGifted;
                try {
                  const fresh = await sb.sbFetch("/rest/v1/rpc/platform_admin_org_summary", {
                    method: "POST", body: JSON.stringify({}),
                  });
                  const updated = (fresh || []).find(o => o.id === orgId);
                  if (updated) Object.assign(org, updated);
                } catch (_) { /* fall through with optimistic cache */ }
                restore();
              } catch (err) {
                const m = err.message || "";
                let msg;
                if (/platform admin only|insufficient_privilege/i.test(m)) {
                  msg = "Only platform admins can change gifted seats.";
                } else if (/cannot revoke/i.test(m)) {
                  msg = m;
                } else if (/positive integer/i.test(m)) {
                  msg = "Gifted seats must be a non-negative whole number.";
                } else {
                  msg = `Couldn't update gifted seats: ${m}`;
                }
                alert(msg);
                restore();
              }
            };
            const cancel = () => {
              if (done) return;
              done = true;
              restore();
            };

            input.addEventListener("blur", commit);
            input.addEventListener("keydown", (ev) => {
              if (ev.key === "Enter")  { ev.preventDefault(); input.blur(); }
              if (ev.key === "Escape") { ev.preventDefault(); cancel(); input.blur(); }
            });
          });
        });
      }

      // ---- formatters ----------------------------------------------------

      function fmtInt(n) {
        return n == null ? "—" : Number(n).toLocaleString();
      }
      function fmtDateTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return esc(String(iso));
        // "Nov 4, 2025" — human-readable, locale-aware.
        return d.toLocaleDateString(undefined, {
          year: "numeric", month: "short", day: "numeric",
        });
      }

      function esc(s) {
        return String(s ?? "").replace(/[&<>"']/g, c =>
          ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])
        );
      }
    })();
  </script>

  <footer class="app-footer">
    <a href="/guides/">Guides</a><span class="sep">·</span><a href="/terms/">Terms</a><span class="sep">·</span><a href="/privacy/">Privacy</a><span class="sep">·</span>&copy; 2026 Uptown Creation, LLC
  </footer>
</body>
</html>
